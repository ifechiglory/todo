<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="todo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" />
</head>
<body>
    <h1>To-Do List</h1>
    <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Consequuntur veniam exercitationem voluptatem? Vitae, aliquam assumenda! Hic reiciendis labore molestiae ex ipsam velit et, delectus doloribus beatae. Neque velit porro quia?
    </p>

    <form id="todo-form">
        <input type="text" id="todo-input" placeholder="Enter a task">
        <button type="submit" id="add">Add Task</button>
    </form>
    <ul id="todo-list"></ul>
    <script src="todo.js"></script>
</body>
</html>
